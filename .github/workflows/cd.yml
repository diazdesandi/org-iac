name: Deploy
on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write
concurrency:
  group: pulumi-deploy
  cancel-in-progress: false

env:
  HUSKY: 0

jobs:
  build:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Authenticate with Pulumi Cloud
        uses: pulumi/auth-actions@v1
        with:
          organization: diazdesandi
          requested-token-type: urn:pulumi:token-type:access_token:personal

      - name: Run Pulumi up
        uses: pulumi/actions@v7
        with:
          command: up
          stack-name: diazdesandi/org-config
