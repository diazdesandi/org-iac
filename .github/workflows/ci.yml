name: CI
on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/pulumi.yml"
      - "src/**"
      - "config/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pulumi-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: 0

jobs:
  checks:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Biome lint
        run: bun run check

      - name: Run tests
        run: bun test

  preview:
    permissions:
      pull-requests: write
      id-token: write

    needs: checks
    uses: ./.github/workflows/pulumi.yml
    secrets: inherit
    with:
      command: preview
      comment-on-pr: true
