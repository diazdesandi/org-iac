name: Pulumi Setup
on:
  workflow_call:
    inputs:
      command:
        required: true
        type: string
      comment-on-pr:
        required: false
        type: boolean
        default: false

jobs:
  run:
    runs-on: ubuntu-slim
    env:
      HUSKY: 0
    steps:
      - uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Authenticate with Pulumi Cloud
        uses: pulumi/auth-actions@v2.1.0
        with:
          organization: diazdesandi
          requested-token-type: urn:pulumi:token-type:access_token:personal
          scope: user:diazdesandi

      - name: Run Pulumi ${{ inputs.command }}
        uses: pulumi/actions@v7
        with:
          command: ${{ inputs.command }}
          stack-name: diazdesandi/org-config
          comment-on-pr: ${{ inputs.comment-on-pr }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
