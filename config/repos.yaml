repos:
  - name: org-ci
    description: A repository for organization-wide CI/CD workflows and automation scripts.
    visibility: public
    topics:
      - ci
      - cd
      - automation
      - github-actions
    template: none
    mergeStrategies:
      - squash
    deleteBranchOnMerge: true
    autoInit: false
    branchProtection:
      main:
        requiredReviewCount: 1
        requiredStatusChecks:
          - build
        requiredLinearHistory: true

  - name: ctl
    description: A repository for managing control logic and operations.
    visibility: public
    topics:
      - macos
      - swift
      - cli
      - automation
      - menu-bar
    template: swift-package
    mergeStrategies:
      - squash
    deleteBranchOnMerge: true
    autoInit: false
    branchProtection:
      main:
        requiredReviewCount: 1
        requiredStatusChecks:
          - build
        requiredLinearHistory: true

  - name: main-repo
    description: Primary repository for product code and roadmap.
    visibility: public
    template: none
    mergeStrategies:
      - squash
    deleteBranchOnMerge: true
    autoInit: false
    branchProtection:
      main:
        requiredReviewCount: 1
        requiredStatusChecks:
          - build
        requiredLinearHistory: true

  - name: dot-github
    description: Shared organization workflows, issue templates, and defaults.
    visibility: public
    template: docs
    mergeStrategies:
      - squash
    deleteBranchOnMerge: true
    autoInit: false
    branchProtection:
      main:
        requiredReviewCount: 1
        requiredStatusChecks:
          - validate
        requiredLinearHistory: true

  - name: homebrew-tap
    description: Homebrew tap formulas for organization releases.
    visibility: public
    template: none
    mergeStrategies:
      - squash
    deleteBranchOnMerge: true
    autoInit: false
    branchProtection:
      main:
        requiredReviewCount: 1
        requiredStatusChecks:
          - test
        requiredLinearHistory: true

  - name: translations
    description: Translation files for the organization.
    visibility: public
    template: none
    mergeStrategies:
      - squash
    deleteBranchOnMerge: true
    autoInit: false
    branchProtection:
      main:
        requiredReviewCount: 1
        requiredStatusChecks:
          - test
        requiredLinearHistory: true
